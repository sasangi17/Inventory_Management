<script>
function updateDashboard() {
    fetch('dashboard_data.php')
        .then(res => res.json())
        .then(data => {
            document.getElementById('userCount').innerText = data.users;
            document.getElementById('categoryCount').innerText = data.categories;
            document.getElementById('productCount').innerText = data.products;
            document.getElementById('salesTotal').innerText = `$${data.sales}`;
        });
}
updateDashboard();
setInterval(updateDashboard, 5000); // auto-update every 5 seconds
</script>
